name: Docker Build and Push

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Base Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.base
          push: true
          tags: mennatallahmedhat/rag-base:latest,mennatallahmedhat/rag-base:${{ github.sha }}
          cache-from: type=registry,ref=mennatallahmedhat/rag-base:latest
          cache-to: type=inline

      - name: Build and Push Monolith Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.monolith
          push: true
          tags: mennatallahmedhat/rag-monolith:latest,mennatallahmedhat/rag-monolith:${{ github.sha }}
          cache-from: type=registry,ref=mennatallahmedhat/rag-monolith:latest
          cache-to: type=inline

      - name: Build and Push Worker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.worker
          push: true
          tags: mennatallahmedhat/rag-worker:latest,mennatallahmedhat/rag-worker:${{ github.sha }}
          cache-from: type=registry,ref=mennatallahmedhat/rag-worker:latest
          cache-to: type=inline

      - name: Build and Push Evaluation Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.evaluation
          push: true
          tags: mennatallahmedhat/rag-evaluation:latest,mennatallahmedhat/rag-evaluation:${{ github.sha }}
          cache-from: type=registry,ref=mennatallahmedhat/rag-evaluation:latest
          cache-to: type=inline

      - name: Build and Push UI Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.rag-ui
          push: true
          tags: mennatallahmedhat/rag-ui:latest,mennatallahmedhat/rag-ui:${{ github.sha }}
          cache-from: type=registry,ref=mennatallahmedhat/rag-ui:latest
          cache-to: type=inline
