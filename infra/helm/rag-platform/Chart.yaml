apiVersion: v2
name: rag-platform
description: >-
  Umbrella Helm chart for the RAG platform. Bundles monolith-service
  (FastAPI gateway hosting domain/ingestion/retrieval/generation routes),
  worker-service (Celery document processing), evaluation-service
  (FastAPI + Celery worker + Celery beat for LLM-as-judge scoring), and
  rag-ui (Vite/React frontend served by nginx). PostgreSQL, Redis, and
  Keycloak are treated as external dependencies — this chart only injects
  their connection details via Secrets/ConfigMaps, it does not deploy
  them. TLS/Ingress for rag-ui is handled separately by a teammate's
  cert-manager work — see the README's "TLS / public access" section.
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: monolith-service
    version: "0.1.0"
    repository: "file://charts/monolith-service"
    condition: monolith-service.enabled

  - name: evaluation-service
    version: "0.1.0"
    repository: "file://charts/evaluation-service"
    condition: evaluation-service.enabled

  - name: worker-service
    version: "0.1.0"
    repository: "file://charts/worker-service"
    condition: worker-service.enabled

  - name: rag-ui
    version: "0.1.0"
    repository: "file://charts/rag-ui"
    condition: rag-ui.enabled
