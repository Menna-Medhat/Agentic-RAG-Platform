apiVersion: v2
name: worker-service
description: >-
  Celery worker for document ingestion: OCR (PaddleOCR + Surya fallback),
  chunking, embedding, NER (GLiNER), relation extraction, and indexing into
  Qdrant + PostgreSQL + Apache AGE. Deployment only — no HTTP, so no
  Service or HPA, per spec.
type: application
