# =============================================================================
# infra/docker/nginx.conf
#
# Serves the built rag-ui static files (Vite/React) and proxies /api/*
# to monolith-service inside the cluster.
#
# WHY /api/* IS PROXIED HERE INSTEAD OF CALLED DIRECTLY FROM THE BROWSER:
#   monolith-service is ClusterIP-only — not reachable from outside the
#   cluster at all. The browser only ever talks to rag-ui (which IS
#   externally exposed, via the Ingress a teammate is building separately
#   for TLS). nginx then forwards API calls server-side, inside the
#   cluster network, over plain HTTP — that's fine, it's pod-to-pod
#   traffic, not crossing the public internet.
#
# "monolith-service" below is a Kubernetes Service DNS name. Helm renders
# the actual Service name as "<release-name>-monolith-service" — see
# the SERVICE_HOST environment substitution note at the bottom of this
# file for how that gets wired in without hardcoding a release name here.
# =============================================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # --- Static assets (the built Vite app) ---------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- API proxy ------------------------------------------------------------
    # ${MONOLITH_SERVICE_HOST} is substituted at container startup (see
    # the Dockerfile's CMD, which runs envsubst on this file before nginx
    # starts) so this template doesn't hardcode a Helm release name.
    location /api/ {
        proxy_pass http://${MONOLITH_SERVICE_HOST}:${MONOLITH_SERVICE_PORT}/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Generous timeouts: generation/retrieval calls can take several
        # seconds (embedding + reranking + LLM call), confirmed by actual
        # request latencies seen in the project's own logs.
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # --- Health check for K8s probes ------------------------------------------
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
