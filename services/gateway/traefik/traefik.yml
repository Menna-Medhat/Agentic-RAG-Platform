api:
  dashboard: true
  insecure: true  # dev only — dashboard accessible without auth

entryPoints:
  web:
    address: ":80"

providers:
  file:
    directory: /etc/traefik/dynamic
    watch: true  # auto-reload on config change
  docker:
    exposedByDefault: false
    network: rag-network

log:
  level: INFO