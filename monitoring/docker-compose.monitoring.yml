version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Monitoring stack — Prometheus + Grafana + Alertmanager
# Run: docker compose -f monitoring/docker-compose.monitoring.yml up -d
#
# Grafana:      http://localhost:3000  (admin / admin)
# Prometheus:   http://localhost:9091
# Alertmanager: http://localhost:9093
# ─────────────────────────────────────────────────────────────────────────────

services:
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: rag-prometheus
    volumes:
      - ./prometheus/prometheus.yaml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yaml:/etc/prometheus/alerts.yaml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"   # allows hot-reload: curl -X POST localhost:9091/-/reload
    ports:
      - "9091:9090"               # 9091 externally to avoid clash with Celery metrics server
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"   # lets Prometheus reach services on the host

  grafana:
    image: grafana/grafana:10.4.2
    container_name: rag-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: rag-alertmanager
    volumes:
      - ./alertmanager/alertmanager.yaml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "9093:9093"
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
  alertmanager_data: