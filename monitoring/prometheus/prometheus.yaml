global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yaml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  # ── Monolith (domain + ingestion + retrieval + generation + evaluation) ──────
  - job_name: monolith-service
    static_configs:
      - targets: ["host.docker.internal:8000"]
    metrics_path: /metrics

  # ── Evaluation-service (standalone on 8005) ─────────────────────────────────
  - job_name: evaluation-service
    static_configs:
      - targets: ["host.docker.internal:8005"]
    metrics_path: /metrics

  # ── Celery worker (separate tiny HTTP server on port 9090) ──────────────────
  - job_name: worker-service
    static_configs:
      - targets: ["host.docker.internal:9090"]
    metrics_path: /metrics

  # ── Prometheus self-monitoring ──────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9091"]